pipeline:
  raw_data: data/creditcard_raw.csv
  ingested_data: data/creditcard_ingested.csv
  train: data/train.csv
  val: data/val.csv
  test: data/test.csv
  train_features: data/train_features.csv
  val_features: data/val_features.csv
  test_features: data/test_features.csv
  preprocessor: data/preprocessor.pkl

preprocessing:
  val_frac: 0.15
  test_frac: 0.15
  amount_clip_lower: 0
  cyclical_encoding: true

features:
  velocity_windows: [10, 50, 100]
  iv_threshold: 0.02

training:
  smote: true
  smote_k_neighbors: 5
  random_state: 42
  fbeta_beta: 2.0
  models:
    logistic_regression:
      C: 0.1
      max_iter: 1000
    random_forest:
      n_estimators: 200
      max_depth: 12
    xgboost:
      n_estimators: 300
      max_depth: 6
      learning_rate: 0.05

serving:
  latency_sla_ms: 50
  default_threshold: 0.5

monitoring:
  psi_warning: 0.1
  psi_alert: 0.2
  check_interval_hours: 24

mlflow:
  tracking_uri: mlruns
  experiment_name: fraud_detection
